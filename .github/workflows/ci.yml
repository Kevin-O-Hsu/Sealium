name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install --no-deps -e .   # 项目本体（依赖已由锁文件提供，避免重解析）

      - name: Run tests
        run: pytest -ra

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install locked runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --no-deps -e .   # 项目本体（依赖已由锁文件提供）

      # 依赖漏洞扫描（A03 供应链）。审计锁定的运行时依赖树；失败即阻断合并。
      - name: Audit dependencies for known CVEs
        run: pip-audit --strict
