[build-system]
requires = ["setuptools>=77.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sealium"
version = "1.0.5"
description = "Secure license key generation, software activation, and hardware binding."
readme = "README.md"
license = "GPL-3.0-or-later"
authors = [{ name = "Kevin Hsu" }]
dependencies = ["cryptography", "requests", "fastapi", "uvicorn", "wmi"]